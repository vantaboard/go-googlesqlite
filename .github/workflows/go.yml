name: Go
on:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    shell: bash

env:
  CGO_ENABLED: "1"

jobs:
  ci:
    name: CI
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ["1.26"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout go-googlesqlite
        uses: actions/checkout@v4
        with:
          path: go-googlesqlite
      - name: Resolve go-googlesql version
        id: gsql
        run: |
          v=$(awk '/github.com\/vantaboard\/go-googlesql /{print $2; exit}' go-googlesqlite/go.mod)
          echo "v=${v}" >> "$GITHUB_OUTPUT"
          echo "go-googlesql module version: ${v}"
      - name: Checkout go-googlesql
        uses: actions/checkout@v4
        with:
          repository: vantaboard/go-googlesql
          ref: ${{ steps.gsql.outputs.v }}
          path: go-googlesql
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: go-googlesqlite/go.sum
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          # Avoid unauthenticated GitHub API rate limits on shared runner IPs (macOS often hits this first).
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install C/C++ toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # clang alone does not ship libstdc++ C++ headers; clang++ can still fail to find <chrono> for CGO.
          # Use GCC as CC/CXX on Linux so libstdc++ headers and driver stay matched (see Configure CGO compilers).
          sudo apt-get install -y --no-install-recommends clang build-essential
      - name: Configure CGO compilers
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            echo "CC=gcc" >> "$GITHUB_ENV"
            echo "CXX=g++" >> "$GITHUB_ENV"
          else
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
          fi
      - name: Install bazelisk
        run: |
          go install github.com/bazelbuild/bazelisk@v1.20.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-googlesql-${{ hashFiles('go-googlesql/internal/cmd/updater/googlesql.ref', 'go-googlesql/internal/cmd/updater/Dockerfile', 'go-googlesql/go.mod', 'go-googlesql/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-bazel-googlesql-
      - name: Default prebuilts (release tarball or Bazel)
        working-directory: ${{ github.workspace }}
        env:
          GOOGLESQL_VERSION: ${{ steps.gsql.outputs.v }}
        run: bash go-googlesql/scripts/ci-download-or-build-default-prebuilts.sh go-googlesql
      # Tarballs include stable names (lib/*.a) as symlinks to ${GOOS}_${GOARCH}/*.a. Older googlesql-prebuilts
      # extraction skipped symlink entries; recreate so CGO -force_load paths resolve (macOS + Linux).
      - name: Ensure prebuilt lib symlinks
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          R="${{ github.workspace }}/go-googlesql"
          ga="$(go env GOOS)_$(go env GOARCH)"
          p="$R/internal/ccall/go-protobuf/protobuf/lib"
          u="$R/internal/ccall/go-googlesql-unified/lib"
          if [[ -f "$p/$ga/libprotobuf_cgo.a" ]]; then
            ln -sfn "$ga/libprotobuf_cgo.a" "$p/libprotobuf_cgo.a"
          fi
          if [[ -f "$u/$ga/libgooglesql.a" ]]; then
            ln -sfn "$ga/libgooglesql.a" "$u/libgooglesql.a"
          fi
          if [[ "$(go env GOOS)" == "linux" ]] && [[ -f "$p/$ga/libcxx_prebuilt.a" ]]; then
            ln -sfn "$ga/libcxx_prebuilt.a" "$p/libcxx_prebuilt.a"
            ln -sfn "$ga/libcxxabi_prebuilt.a" "$p/libcxxabi_prebuilt.a"
          fi
      # CGO #cgo LDFLAGS use ${SRCDIR} under the module; prebuilts live in the sibling checkout, not in GOMODCACHE.
      - name: Point go.mod at local go-googlesql (prebuilts)
        working-directory: go-googlesqlite
        run: go mod edit -replace "github.com/vantaboard/go-googlesql=${{ github.workspace }}/go-googlesql"
      - name: Build
        working-directory: go-googlesqlite
        env:
          GO_GOOGLESQL_ROOT: ${{ github.workspace }}/go-googlesql
        run: task build
      - name: Test with coverage
        working-directory: go-googlesqlite
        env:
          GO_GOOGLESQL_ROOT: ${{ github.workspace }}/go-googlesql
        run: task cover
      - name: Lint
        working-directory: go-googlesqlite
        env:
          GO_GOOGLESQL_ROOT: ${{ github.workspace }}/go-googlesql
        run: task lint
      - name: Upload coverage to Codecov
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
          verbose: true
          files: go-googlesqlite/cover.out
