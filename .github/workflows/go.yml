name: Go
on:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    shell: bash

env:
  CGO_ENABLED: "1"
  CC: clang
  CXX: clang++

jobs:
  ci:
    name: CI
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ["1.26"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout go-googlesqlite
        uses: actions/checkout@v4
        with:
          path: go-googlesqlite
      - name: Resolve go-googlesql version
        id: gsql
        run: |
          v=$(awk '/github.com\/vantaboard\/go-googlesql /{print $2; exit}' go-googlesqlite/go.mod)
          echo "v=${v}" >> "$GITHUB_OUTPUT"
          echo "go-googlesql module version: ${v}"
      - name: Checkout go-googlesql
        uses: actions/checkout@v4
        with:
          repository: vantaboard/go-googlesql
          ref: ${{ steps.gsql.outputs.v }}
          path: go-googlesql
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: go-googlesqlite/go.sum
      # Match go-googlesql: go install via proxy.golang.org (no arduino/setup-task GitHub API).
      - name: Install Task
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Install C/C++ toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Stack uses -stdlib=libc++ (go-googlesql-env.sh). clang alone has no libc++ headers — need LLVM libc++ dev.
          sudo apt-get install -y --no-install-recommends clang build-essential libc++-dev libc++abi-dev
      - name: Install bazelisk
        run: |
          go install github.com/bazelbuild/bazelisk@v1.20.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      # Bazel 7.x–8.x on macOS default to /private/var/tmp, not ~/.cache/bazel, so actions/cache
      # would warn on save ("Path ... does not exist"). Align output root with Linux + cache path.
      - name: macOS Bazel output root (match ~/.cache/bazel cache)
        if: runner.os == 'macOS'
        run: echo "BAZELISK_STARTUP_OPTS=--output_user_root=${HOME}/.cache/bazel" >> "$GITHUB_ENV"
      # Tarball prebuilts skip Bazel entirely; Bazel also only creates ~/.cache/bazel after first run.
      # Post Cache warns if the path is missing at job end — ensure it exists (match go-googlesql go.yml).
      - name: Ensure Bazel cache directory exists
        run: mkdir -p "$HOME/.cache/bazel"
      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-googlesql-${{ hashFiles('go-googlesql/scripts/maint-pins/googlesql.ref', 'go-googlesql/go.mod', 'go-googlesql/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-bazel-googlesql-
      - name: Default prebuilts (release tarball or Bazel)
        working-directory: ${{ github.workspace }}
        env:
          GOOGLESQL_VERSION: ${{ steps.gsql.outputs.v }}
        run: bash go-googlesql/scripts/ci-download-or-build-default-prebuilts.sh go-googlesql
      # Tarballs include stable names (lib/*.a) as symlinks to ${GOOS}_${GOARCH}/*.a. Older googlesql-prebuilts
      # extraction skipped symlink entries; recreate so CGO -force_load paths resolve (macOS + Linux).
      - name: Ensure prebuilt lib symlinks
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          R="${{ github.workspace }}/go-googlesql"
          ga="$(go env GOOS)_$(go env GOARCH)"
          p="$R/internal/ccall/go-protobuf/protobuf/lib"
          u="$R/internal/ccall/go-googlesql-unified/lib"
          if [[ -f "$p/$ga/libprotobuf_cgo.a" ]]; then
            ln -sfn "$ga/libprotobuf_cgo.a" "$p/libprotobuf_cgo.a"
          fi
          if [[ -f "$u/$ga/libgooglesql.a" ]]; then
            ln -sfn "$ga/libgooglesql.a" "$u/libgooglesql.a"
          fi
          if [[ "$(go env GOOS)" == "linux" ]] && [[ -f "$p/$ga/libcxx_prebuilt.a" ]]; then
            ln -sfn "$ga/libcxx_prebuilt.a" "$p/libcxx_prebuilt.a"
            ln -sfn "$ga/libcxxabi_prebuilt.a" "$p/libcxxabi_prebuilt.a"
          fi
      # CGO #cgo LDFLAGS use ${SRCDIR} under the module; prebuilts live in the sibling checkout, not in GOMODCACHE.
      - name: Point go.mod at local go-googlesql (prebuilts)
        working-directory: go-googlesqlite
        run: go mod edit -replace "github.com/vantaboard/go-googlesql=${{ github.workspace }}/go-googlesql"
      - name: Build
        working-directory: go-googlesqlite
        env:
          GO_GOOGLESQL_ROOT: ${{ github.workspace }}/go-googlesql
        run: task build
      - name: Test with coverage
        working-directory: go-googlesqlite
        env:
          GO_GOOGLESQL_ROOT: ${{ github.workspace }}/go-googlesql
        run: task cover
      - name: Lint
        working-directory: go-googlesqlite
        env:
          GO_GOOGLESQL_ROOT: ${{ github.workspace }}/go-googlesql
        run: task lint
      - name: Upload coverage to Codecov
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
          verbose: true
          files: go-googlesqlite/cover.out
