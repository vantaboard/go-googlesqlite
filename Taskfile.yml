version: "3"

# https://taskfile.dev — same dev image and GO_CACHE_ROOT as go-googlesql (see ../go-googlesql/Taskfile.yml).
# Tasks source `.envrc` so CGO/linker env matches direnv.

vars:
  PKG: github.com/vantaboard/go-googlesqlite
  # Must be built with Go >= go.mod (1.26); older releases error: "lower than the targeted Go version"
  GOLANGCI_LINT_VERSION: v2.11.4
  DOCKER_DEV_IMAGE: go-googlesql:dev

tasks:
  default:
    desc: Show common tasks (full list task --list-all)
    cmds:
      - |
        echo "go-googlesqlite — https://taskfile.dev (task --list-all)"
        echo "Common: task build | task test:prebuilt | task test:linux | task cover"
        echo "Partial tests: TESTFLAGS='-run SomeTest -count=1' task test:prebuilt  (always use task; sources .envrc / stack bootstrap)"

  build:
    desc: Build googlesqlite-cli with unified prebuilt tags
    cmds:
      - |
        set -euo pipefail
        source .envrc
        cd ./cmd/googlesqlite-cli && go build -tags "$GOOGLESQL_BUILD_TAGS" .

  cover:
    desc: Run tests with coverage (cover.out)
    cmds:
      - |
        set -euo pipefail
        source .envrc
        PKGS=$(go list -tags "$GOOGLESQL_BUILD_TAGS" ./... | grep -v cmd | grep -v benchmarks)
        COVER_PKGS=$(echo "$PKGS" | awk -v pkg='{{.PKG}}' '{ gsub(pkg, "."); print }' | paste -sd, -)
        go test -tags "$GOOGLESQL_BUILD_TAGS" -coverpkg="$COVER_PKGS" -coverprofile=cover.out ./...

  cover:html:
    desc: Open HTML coverage (requires cover)
    deps: [cover]
    cmds:
      - go tool cover -html=cover.out

  lint:install:
    desc: Install golangci-lint into ./bin
    cmds:
      - mkdir -p ./bin
      - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b ./bin {{.GOLANGCI_LINT_VERSION}}

  lint:
    desc: golangci-lint (build tags from env)
    deps: [lint:install]
    cmds:
      - |
        set -euo pipefail
        source .envrc
        ./bin/golangci-lint run --timeout 30m --build-tags="$GOOGLESQL_BUILD_TAGS"

  test:prebuilt:
    desc: Host tests with the same CGO env as go-googlesql Task. Optional TESTFLAGS for go test (e.g. -run Foo).
    cmds:
      - |
        set -euo pipefail
        source .envrc
        go test -tags "$GOOGLESQL_BUILD_TAGS" -p 1 -count=1 ${TESTFLAGS:-} ./...

  test:duckdb-lib:
    desc: |
      Tests with DuckDB dynamically linked (duckdb + duckdb_use_lib).
      Set DUCKDB_LIB_DIR to the directory containing libduckdb.so (Linux) or libduckdb.dylib (macOS).
      See https://github.com/duckdb/duckdb-go#linking-a-dynamic-library
    cmds:
      - |
        set -euo pipefail
        source .envrc
        : "${DUCKDB_LIB_DIR:?set DUCKDB_LIB_DIR to the directory with libduckdb (see duckdb-go README)}"
        export CGO_ENABLED=1
        export CGO_LDFLAGS="${CGO_LDFLAGS} -lduckdb -L${DUCKDB_LIB_DIR}"
        # Nounset-safe prepend: ${VAR:+...} trips `set -u` under zsh when VAR is unset.
        if [[ "$(uname -s)" == "Darwin" ]]; then
          if [[ -n "${DYLD_LIBRARY_PATH-}" ]]; then
            export DYLD_LIBRARY_PATH="${DUCKDB_LIB_DIR}:${DYLD_LIBRARY_PATH}"
          else
            export DYLD_LIBRARY_PATH="${DUCKDB_LIB_DIR}"
          fi
        else
          if [[ -n "${LD_LIBRARY_PATH-}" ]]; then
            export LD_LIBRARY_PATH="${DUCKDB_LIB_DIR}:${LD_LIBRARY_PATH}"
          else
            export LD_LIBRARY_PATH="${DUCKDB_LIB_DIR}"
          fi
        fi
        TAGS="${GOOGLESQL_BUILD_TAGS},duckdb,duckdb_use_lib"
        go test -tags "${TAGS}" -p 1 -count=1 ${TESTFLAGS:-} ./...

  docker:build-dev-googlesql:
    desc: Build go-googlesql:dev in the sibling checkout (required for test:linux)
    cmds:
      - |
        set -euo pipefail
        source .envrc
        task -d "$GO_GOOGLESQL_ROOT" docker:build-dev

  test:linux:
    desc: Run go test -race in go-googlesql:dev with shared GO_CACHE_ROOT
    deps: [docker:build-dev-googlesql]
    cmds:
      - |
        set -euo pipefail
        source .envrc
        docker run --rm \
          -e CGO_ENABLED=1 -e CC=clang -e CXX=clang++ \
          -e CCACHE_DIR=/root/.ccache -e CCACHE_COMPRESS=1 \
          -v "$PWD":/work/go-googlesqlite \
          -v "$GO_GOOGLESQL_ROOT":/work/go-googlesql \
          -v "$GO_CACHE_ROOT/gocache":/root/.cache/go-build \
          -v "$GO_CACHE_ROOT/gomodcache":/go/pkg/mod \
          -v "$GO_CACHE_ROOT/ccache":/root/.ccache \
          -w /work/go-googlesqlite \
          {{.DOCKER_DEV_IMAGE}} \
          bash -c 'set -euo pipefail; source /work/go-googlesql/scripts/go-googlesql-stack-bootstrap.sh; go test -race -v ./... -count=1'
